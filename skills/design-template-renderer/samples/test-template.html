<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Montserrat';
    src: url('{{ASSETS}}fonts/Montserrat-Bold.ttf') format('truetype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'Playfair Display';
    src: url('{{ASSETS}}fonts/PlayfairDisplay-Black.ttf') format('truetype');
    font-weight: 900;
  }
  body {
    margin: 0;
    width: 1080px;
    height: 1350px;
    background: #F5EFDF;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    color: #1F2A3D;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 96px;
    color: #B99A44;
    margin: 0;
  }
  p { font-size: 32px; margin-top: 20px; font-weight: 700; }
  .test-vi { font-size: 28px; margin-top: 40px; line-height: 1.5; }
</style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p>{{ subtitle }}</p>
  <div class="test-vi">
    {{#tests}}
      <div>{{ text }}</div>
    {{/tests}}
  </div>
</body>
</html>
