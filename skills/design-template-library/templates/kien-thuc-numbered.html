<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>{{ title_line1 }} {{ title_line2 }}</title>
<style>
  /* ─── FONTS ─────────────────────────────────────────────── */
  @font-face { font-family: 'Montserrat'; src: url('{{ASSETS}}fonts/Montserrat-Regular.ttf') format('truetype'); font-weight: 400; }
  @font-face { font-family: 'Montserrat'; src: url('{{ASSETS}}fonts/Montserrat-Medium.ttf') format('truetype'); font-weight: 500; }
  @font-face { font-family: 'Montserrat'; src: url('{{ASSETS}}fonts/Montserrat-SemiBold.ttf') format('truetype'); font-weight: 600; }
  @font-face { font-family: 'Montserrat'; src: url('{{ASSETS}}fonts/Montserrat-Bold.ttf') format('truetype'); font-weight: 700; }
  @font-face { font-family: 'Montserrat'; src: url('{{ASSETS}}fonts/Montserrat-Black.ttf') format('truetype'); font-weight: 900; }
  @font-face { font-family: 'Playfair Display'; src: url('{{ASSETS}}fonts/PlayfairDisplay-Regular.ttf') format('truetype'); font-weight: 400; }
  @font-face { font-family: 'Playfair Display'; src: url('{{ASSETS}}fonts/PlayfairDisplay-Italic.ttf') format('truetype'); font-weight: 400; font-style: italic; }
  @font-face { font-family: 'Playfair Display'; src: url('{{ASSETS}}fonts/PlayfairDisplay-Bold.ttf') format('truetype'); font-weight: 700; }
  @font-face { font-family: 'Playfair Display'; src: url('{{ASSETS}}fonts/PlayfairDisplay-Black.ttf') format('truetype'); font-weight: 900; }
  @font-face { font-family: 'Allura'; src: url('{{ASSETS}}fonts/Allura-Regular.ttf') format('truetype'); font-weight: 400; }

  /* ─── BASE ──────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: #F5EFDF;
    background-image:
      radial-gradient(ellipse at 50% 30%, rgba(221, 201, 108, 0.12) 0%, transparent 60%),
      linear-gradient(135deg, #F5EFDF 0%, #EFE7D2 100%);
    font-family: 'Montserrat', sans-serif;
    color: #333333;
    overflow: hidden;
    position: relative;
  }

  /* Subtle decorative pattern (skyline silhouette gradient) */
  body::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 320px;
    background:
      linear-gradient(180deg, transparent 0%, rgba(185, 154, 68, 0.04) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── LAYOUT ────────────────────────────────────────────── */
  .page {
    width: 100%;
    height: 100%;
    padding: 50px 60px 40px 60px;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* ─── TOP BAR (logo + series header) ─────────────────────── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
  }

  .logo {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .logo img {
    height: 44px;
    width: auto;
  }
  .logo-tagline {
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: #555555;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .series-block {
    text-align: right;
  }
  .series-header {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #B99A44;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .series-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #555555;
    text-transform: uppercase;
  }
  .series-number {
    display: inline-block;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: #B99A44;
    font-size: 18px;
    margin-left: 6px;
  }

  /* ─── DIVIDER ───────────────────────────────────────────── */
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, #DDC96C 0%, #BA9B44 50%, #966C26 100%);
    margin: 0 auto 16px auto;
  }

  /* ─── TITLE BLOCK ───────────────────────────────────────── */
  .title-block {
    text-align: center;
    margin-bottom: 12px;
  }
  .title-line {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 64px;
    line-height: 1.05;
    color: #1F2A3D;
    letter-spacing: -1px;
  }
  .subtitle {
    font-family: 'Allura', cursive;
    font-size: 38px;
    color: #B99A44;
    margin-top: 14px;
    line-height: 1.1;
  }

  /* ─── BIG NUMBER ANCHOR ─────────────────────────────────── */
  .anchor {
    text-align: center;
    margin: 16px 0 12px 0;
    position: relative;
  }
  .big-number {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 220px;
    line-height: 0.95;
    background: linear-gradient(135deg, #DDC96C 0%, #BA9B44 50%, #966C26 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 4px 16px rgba(150, 108, 38, 0.18);
    display: inline-block;
  }
  .big-number-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #1F2A3D;
    margin-top: -4px;
  }

  /* Sparkle decoration */
  .sparkle {
    position: absolute;
    color: #B99A44;
    font-size: 24px;
    opacity: 0.6;
  }
  .sparkle.s1 { top: 20px; left: 20%; }
  .sparkle.s2 { top: 60px; right: 22%; font-size: 16px; }
  .sparkle.s3 { bottom: 10px; left: 28%; font-size: 18px; }

  /* ─── CARDS GRID ────────────────────────────────────────── */
  .cards {
    display: grid;
    grid-template-columns: repeat(var(--cols, 3), 1fr);
    gap: 12px;
    margin-top: 16px;
    margin-bottom: 24px;
  }
  .cards.cols-3 { --cols: 3; }
  .cards.cols-4 { --cols: 2; }  /* 4 cards = 2x2 grid */

  .card {
    background: rgba(255, 255, 255, 0.65);
    border: 1px solid rgba(185, 154, 68, 0.35);
    border-radius: 14px;
    padding: 18px 16px;
    text-align: left;
    box-shadow: 0 2px 8px rgba(185, 154, 68, 0.12);
    display: flex;
    flex-direction: column;
    min-height: 140px;
  }
  .card-number {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    color: #B99A44;
    line-height: 1;
    margin-bottom: 6px;
  }
  .card-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    color: #1F2A3D;
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .card-body {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 12px;
    line-height: 1.45;
    color: #555555;
  }

  /* ─── FOOTER (CTA + tagline) ────────────────────────────── */
  .footer {
    margin-top: auto;
    text-align: center;
  }
  .cta-button {
    display: inline-block;
    background: linear-gradient(135deg, #BA9B44 0%, #966C26 100%);
    color: #FFFFFF;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 13px 32px;
    border-radius: 30px;
    box-shadow: 0 4px 14px rgba(150, 108, 38, 0.3);
    margin-bottom: 14px;
  }
  .footer-tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-style: italic;
    font-size: 12px;
    color: #555555;
    letter-spacing: 0.2px;
  }
  .footer-tagline .pqr-mark {
    color: #B99A44;
    font-weight: 700;
    font-style: normal;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div class="page">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">
      <img src="{{ASSETS}}logo-pqr-color.png" alt="PQR">
      <div class="logo-tagline">Your Prosperity · Our Success</div>
    </div>
    <div class="series-block">
      <div class="series-header">{{ header }}</div>
      <div class="series-label">{{ series_label }}<span class="series-number">{{ series_number }}</span></div>
    </div>
  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- TITLE -->
  <div class="title-block">
    <div class="title-line">{{ title_line1 }}</div>
    <div class="title-line">{{ title_line2 }}</div>
    <div class="subtitle">{{ subtitle }}</div>
  </div>

  <!-- BIG NUMBER ANCHOR -->
  <div class="anchor">
    <span class="sparkle s1">✦</span>
    <span class="sparkle s2">✦</span>
    <span class="sparkle s3">✧</span>
    <div class="big-number">{{ big_number }}</div>
    <div class="big-number-label">{{ big_number_label }}</div>
  </div>

  <!-- CARDS -->
  <div class="cards cols-{{ cards_cols }}">
    {{#cards}}
    <div class="card">
      <div class="card-number">{{ number }}</div>
      <div class="card-title">{{ title }}</div>
      <div class="card-body">{{ body }}</div>
    </div>
    {{/cards}}
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="cta-button">{{ cta }}</div>
    <div class="footer-tagline">
      <span class="pqr-mark">PQR®</span>{{ footer_tagline }}
    </div>
  </div>
</div>
</body>
</html>
